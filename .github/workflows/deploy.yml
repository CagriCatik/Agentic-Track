name: Deploy MkDocs with PAT

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Show installed docs versions
        run: |
          python -m mkdocs --version
          pip show mkdocs mkdocs-material pymdown-extensions

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate PAT secret
        env:
          MKDOCS_DEPLOY_TOKEN: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$MKDOCS_DEPLOY_TOKEN" ]; then
            echo "MKDOCS_DEPLOY_TOKEN is missing or not accessible in this workflow."
            exit 1
          fi

      - name: Resolve PAT user
        id: pat_user
        env:
          MKDOCS_DEPLOY_TOKEN: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["MKDOCS_DEPLOY_TOKEN"]
          req = urllib.request.Request(
              "https://api.github.com/user",
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(req) as resp:
              payload = json.load(resp)
          login = payload.get("login")
          if not login:
              raise SystemExit("Failed to resolve PAT user login from GitHub API.")
          print(f"Resolved PAT user: {login}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"login={login}\\n")
          PY

      - name: Configure PAT remote
        env:
          MKDOCS_DEPLOY_TOKEN: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}
        run: |
          git remote set-url origin "https://${{ steps.pat_user.outputs.login }}:${MKDOCS_DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Verify Git authentication
        run: |
          git ls-remote --exit-code origin HEAD > /dev/null

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --clean
