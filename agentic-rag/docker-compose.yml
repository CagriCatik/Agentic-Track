version: "3.8"

services:
  agentic-rag:
    build: .
    container_name: agentic-rag-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount data so it can read VectorDB and Manifests
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      # Route Ollama requests to Windows host
      - LLM__BASE_URL=http://host.docker.internal:11434
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://agentic-rag:8000/v1
      - OPENAI_API_KEY=dummy
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=False
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - agentic-rag

volumes:
  open-webui-data:
