services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.rag-api
    container_name: agentic-track-rag-api
    restart: unless-stopped
    ports:
      - "${RAG_API_PORT:-8001}:8001"
    environment:
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      RAG_API_MODEL_ID: "${RAG_API_MODEL_ID:-agentic-rag}"
      RAG_API_KEY: "${RAG_API_KEY:-agentic-track-local}"
      RAG_CHAT_MODEL: "${RAG_CHAT_MODEL:-}"
      RAG_EMBED_MODEL: "${RAG_EMBED_MODEL:-}"
      RAG_TEMPERATURE: "${RAG_TEMPERATURE:-0.2}"
      RAG_TOP_K: "${RAG_TOP_K:-3}"
      RAG_RETRIEVAL_CANDIDATES: "${RAG_RETRIEVAL_CANDIDATES:-12}"
      RAG_RERANKER_ENABLED: "${RAG_RERANKER_ENABLED:-True}"
      RAG_RERANKER_MODE: "${RAG_RERANKER_MODE:-auto}"
      RAG_RERANKER_MODEL: "${RAG_RERANKER_MODEL:-}"
      RAG_RERANKER_TOP_N: "${RAG_RERANKER_TOP_N:-8}"
      RAG_CORPUS_DIR: "${RAG_CORPUS_DIR:-/app/corbus}"
      RAG_VECTOR_DB_DIR: "${RAG_VECTOR_DB_DIR:-/app/data/chroma}"
      RAG_COLLECTION_NAME: "${RAG_COLLECTION_NAME:-agentic_rag_docs}"
      RAG_CHUNK_SIZE: "${RAG_CHUNK_SIZE:-1200}"
      RAG_CHUNK_OVERLAP: "${RAG_CHUNK_OVERLAP:-200}"
      RAG_INDEX_ON_START: "${RAG_INDEX_ON_START:-False}"
      RAG_REINDEX_ON_START: "${RAG_REINDEX_ON_START:-False}"
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-agentic-track-rag}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./corbus:/app/corbus:ro
      - ./data/chroma:/app/data/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: agentic-track-open-webui
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_healthy
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      WEBUI_AUTH: "${WEBUI_AUTH:-False}"
      ENABLE_OPENAI_API: "${ENABLE_OPENAI_API:-True}"
      OPENAI_API_BASE_URL: "${OPENAI_API_BASE_URL:-http://rag-api:8001/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-agentic-track-local}"
      OPENAI_API_BASE_URLS: "${OPENAI_API_BASE_URLS:-http://rag-api:8001/v1}"
      OPENAI_API_KEYS: "${OPENAI_API_KEYS:-agentic-track-local}"
      DEFAULT_MODELS: "${DEFAULT_MODELS:-agentic-rag}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
